<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monthly Sales Details - Agro-Direct</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #f8f9fa; }
        .chart-container { background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); padding: 2rem; margin-top: 2rem; }
        .section-title { font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mt-4 mb-3">
            <h2 class="section-title"><i class="fas fa-chart-line me-2"></i>Monthly Sales Details</h2>
            <a href="admin.html" class="btn btn-outline-secondary"><i class="fas fa-arrow-left me-1"></i>Back to Dashboard</a>
        </div>
        <div class="chart-container">
            <canvas id="salesBarChart" height="100"></canvas>
        </div>
        <div class="chart-container mt-4">
            <canvas id="topProductsChart" height="100"></canvas>
        </div>
        <div class="chart-container mt-4">
            <canvas id="ordersLineChart" height="100"></canvas>
        </div>
    </div>
    <script>
        // Function to fetch real sales data
        async function fetchSalesData() {
            try {
                const response = await fetch('/admin/analytics/monthly-sales');
                const data = await response.json();
                
                if (data.salesByMonth && data.salesByMonth.length > 0) {
                    const months = data.salesByMonth.map(row => row.month);
                    const salesData = data.salesByMonth.map(row => row.totalSales);
                    const ordersData = data.salesByMonth.map(row => row.totalOrders);
                    
                    renderSalesBarChart(months, salesData);
                    renderOrdersLineChart(months, ordersData);
                } else {
                    document.querySelector('.container').insertAdjacentHTML('beforeend', '<div class="alert alert-light border text-center mt-4">No real sales data found yet.</div>');
                    renderSalesBarChart(['No Data'], [0]);
                    renderOrdersLineChart(['No Data'], [0]);
                }

                if (data.topProducts && data.topProducts.length > 0) {
                    const productLabels = data.topProducts.map(p => p.name);
                    const productSales = data.topProducts.map(p => p.sales);
                    renderTopProductsChart(productLabels, productSales);
                } else {
                    renderTopProductsChart(['No Products'], [0]);
                }
            } catch (error) {
                console.error('Error fetching sales analytics:', error);
            }
        }

        function renderSalesBarChart(labels, data) {
            new Chart(document.getElementById('salesBarChart').getContext('2d'), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Total Sales (₹)',
                        data: data,
                        backgroundColor: 'rgba(54, 162, 235, 0.7)',
                        borderColor: 'rgba(54, 162, 235, 1)',
                        borderWidth: 2,
                        borderRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false }, title: { display: true, text: 'Monthly Sales (₹)' } },
                    scales: { y: { beginAtZero: true } }
                }
            });
        }

        function renderTopProductsChart(labels, data) {
            new Chart(document.getElementById('topProductsChart').getContext('2d'), {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Top Product Sales',
                        data: data,
                        backgroundColor: [
                            'rgba(255, 99, 132, 0.7)',
                            'rgba(255, 206, 86, 0.7)',
                            'rgba(75, 192, 192, 0.7)',
                            'rgba(153, 102, 255, 0.7)',
                            'rgba(255, 159, 64, 0.7)'
                        ],
                        borderColor: '#fff',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { position: 'bottom' }, title: { display: true, text: 'Top Products by Sales' } }
                }
            });
        }

        function renderOrdersLineChart(labels, data) {
            new Chart(document.getElementById('ordersLineChart').getContext('2d'), {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Total Orders',
                        data: data,
                        fill: false,
                        borderColor: 'rgba(255, 99, 132, 1)',
                        backgroundColor: 'rgba(255, 99, 132, 0.2)',
                        tension: 0.3,
                        pointRadius: 5,
                        pointHoverRadius: 7
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false }, title: { display: true, text: 'Monthly Orders' } },
                    scales: { y: { beginAtZero: true } }
                }
            });
        }

        // Initialize
        fetchSalesData();
    </script>
</body>
</html>
