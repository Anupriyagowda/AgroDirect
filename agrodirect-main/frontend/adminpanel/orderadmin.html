<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Orders - Agro-Direct</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="../theme-switcher.js"></script>
    <style>
        :root {
            --primary-color: #2e7d32;
            --secondary-color: #8bc34a;
            --accent-color: #f9a825;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        /* Navbar */
        .navbar-custom {
            background-color: white;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            padding: 15px 0;
        }

        .navbar-brand {
            color: var(--primary-color) !important;
            font-weight: 700;
            font-size: 1.5rem;
        }

        /* Main Dashboard Container */
        .dashboard-container {
            margin-top: 100px;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
            padding: 20px;
        }

        .panel-header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border-radius: 20px;
            padding: 30px 40px;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(46, 125, 50, 0.2);
        }

        /* Modern Farmer Order Card */
        .order-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(0,0,0,0.05);
            transition: transform 0.3s;
        }

        .order-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.08);
        }

        .order-id-badge {
            background: #e8f5e9;
            color: var(--primary-color);
            padding: 8px 15px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .customer-info-box {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            height: 100%;
            border-left: 4px solid var(--secondary-color);
        }

        .items-box {
            background: #fff;
            border: 1px solid #eee;
            border-radius: 15px;
            padding: 20px;
        }

        /* Farmer-Friendly Big Action Buttons */
        .status-actions {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .big-action-btn {
            font-size: 1.1rem;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-progression {
            background: linear-gradient(135deg, var(--secondary-color), var(--primary-color));
            color: white;
            border: none;
            box-shadow: 0 4px 15px rgba(46, 125, 50, 0.3);
        }
        
        .btn-progression:hover {
            transform: scale(1.05);
            color: white;
            box-shadow: 0 6px 20px rgba(46, 125, 50, 0.4);
        }

        .btn-completed {
            background: #e0e0e0;
            color: #666;
            cursor: not-allowed;
            border: none;
        }

        .status-badge-large {
            font-size: 1.2rem;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 600;
        }

        /* Toast notifications */
        .toast-container {
            position: fixed;
            top: 100px;
            right: 20px;
            z-index: 1050;
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-custom fixed-top">
        <div class="container">
            <a class="navbar-brand" href="../home page/home.html"><i class="fas fa-leaf me-2"></i>Agro-Direct</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="admin.html"><i class="fas fa-tachometer-alt me-1"></i> Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-bold text-success" href="orderadmin.html"><i class="fas fa-truck me-1"></i> Manage Orders</a>
                    </li>
                </ul>
                <div class="d-flex align-items-center">
                    <button class="btn btn-outline-success border-2 rounded-pill px-4" id="logoutBtn">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Toasts -->
    <div class="toast-container" id="toastBox"></div>

    <div class="dashboard-container">
        <!-- Dashboard Header -->
        <div class="panel-header d-flex justify-content-between align-items-center">
            <div>
                <h1 class="mb-2 fw-bold"><i class="fas fa-clipboard-check me-3"></i>Order Management</h1>
                <p class="mb-0 fs-5 opacity-75">Easily pack, ship, and track your customers' orders.</p>
            </div>
        </div>

        <!-- Loading State -->
        <div id="loadingSpinner" class="text-center py-5">
            <div class="spinner-border text-success" style="width: 4rem; height: 4rem;" role="status"></div>
            <h4 class="mt-4 text-success fw-bold">Loading Orders...</h4>
        </div>

        <div id="ordersContainer">
            <!-- Dynamic Orders Here -->
        </div>
    </div>

    <script>
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `alert alert-${type} shadow-lg rounded-pill px-4 py-3 d-flex align-items-center`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'} fs-4 me-3"></i> <strong>${message}</strong>`;
            document.getElementById('toastBox').appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('agroToken');
            window.location.href = '../index.html';
        });

        async function updateOrderStatus(orderId, newStatus, btnElement) {
            btnElement.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Updating...`;
            btnElement.disabled = true;

            try {
                const response = await fetch(`/api/orders/${orderId}/status`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                });

                if (!response.ok) throw new Error('Failed to update status');
                showToast(`Order #${(orderId || '').toString().substring(0,6).toUpperCase()} marked as ${newStatus.toUpperCase()}`);
                
                // Refresh slightly after
                setTimeout(fetchOrders, 1000);
            } catch (err) {
                showToast(err.message, 'danger');
                btnElement.innerHTML = `<i class="fas fa-times"></i> Failed`;
            }
        }

        async function fetchOrders() {
            try {
                const response = await fetch('/api/orders');
                const data = await response.json();
                document.getElementById('loadingSpinner').style.display = 'none';

                if (!data.orders || data.orders.length === 0) {
                    document.getElementById('ordersContainer').innerHTML = `
                        <div class="text-center py-5">
                            <i class="fas fa-box-open text-muted mb-3" style="font-size: 5rem; opacity: 0.3;"></i>
                            <h3 class="text-muted">No orders available.</h3>
                        </div>
                    `;
                    return;
                }

                let html = '';
                data.orders.forEach(order => {
                    const status = (order.orderStatus || 'pending').toLowerCase();
                    const date = new Date(order.orderDate).toLocaleString('en-IN', {
                        day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'
                    });

                    // Determine Next Action Button
                    let nextActionHtml = '';
                    let badgeClass = 'bg-secondary';
                    
                    if (status === 'pending') {
                        badgeClass = 'bg-warning text-dark';
                        nextActionHtml = `<button class="big-action-btn btn-progression" onclick="updateOrderStatus('${order._id}', 'processing', this)"><i class="fas fa-box"></i> Start Processing</button>`;
                    } else if (status === 'processing') {
                        badgeClass = 'bg-info text-dark';
                        nextActionHtml = `<button class="big-action-btn btn-progression" onclick="updateOrderStatus('${order._id}', 'shipped', this)"><i class="fas fa-truck"></i> Mark as Shipped</button>`;
                    } else if (status === 'shipped') {
                        badgeClass = 'bg-primary';
                        nextActionHtml = `<button class="big-action-btn btn-progression" onclick="updateOrderStatus('${order._id}', 'delivered', this)"><i class="fas fa-home"></i> Mark as Delivered</button>`;
                    } else if (status === 'delivered') {
                        badgeClass = 'bg-success';
                        nextActionHtml = `<button class="big-action-btn btn-completed" disabled><i class="fas fa-check-double"></i> Complete</button>`;
                    }

                    const itemsHtml = order.items.map(item => `
                        <div class="d-flex justify-content-between mb-2 pb-2 border-bottom">
                            <span><i class="fas fa-seedling text-success me-2"></i>${item.name} <span class="badge bg-light text-dark border ms-2">x${item.quantity} ${item.unit||''}</span></span>
                            <span class="fw-bold">₹${((item.price||0) * parseFloat(item.quantity||0)).toFixed(2)}</span>
                        </div>
                    `).join('');

                    html += `
                        <div class="order-card">
                            <!-- Header Area -->
                            <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom">
                                <div>
                                    <span class="order-id-badge">Order #${(order._id || '').toString().substring(0,8).toUpperCase()}</span>
                                    <span class="ms-3 text-muted"><i class="far fa-calendar-alt"></i> ${date}</span>
                                </div>
                                <span class="badge ${badgeClass} status-badge-large px-4">${status.toUpperCase()}</span>
                            </div>

                            <!-- Content Grid -->
                            <div class="row g-4 mb-4">
                                <div class="col-md-5">
                                    <div class="customer-info-box">
                                        <h5 class="mb-3 fw-bold"><i class="fas fa-address-card text-success me-2"></i>Customer Details</h5>
                                        <p class="mb-1 fw-semibold fs-5">${order.userId?.name || 'Guest User'}</p>
                                        <p class="mb-1 text-muted"><i class="fas fa-phone-alt me-2"></i>${order.userId?.address?.phone || 'N/A'}</p>
                                        <p class="mb-0 text-muted mt-3"><i class="fas fa-map-marker-alt text-danger me-2"></i>
                                            ${order.userId?.address?.addressLine1 || 'No address provided'}, 
                                            ${order.userId?.address?.city || ''}
                                        </p>
                                    </div>
                                </div>
                                <div class="col-md-7">
                                    <div class="items-box">
                                        <h5 class="mb-3 fw-bold"><i class="fas fa-shopping-basket text-success me-2"></i>Ordered Items</h5>
                                        ${itemsHtml}
                                        <div class="d-flex justify-content-between mt-3 pt-2">
                                            <span class="fs-5 fw-bold text-muted">Total Payment:</span>
                                            <span class="fs-4 fw-bold text-success">₹${order.totalAmount.toFixed(2)}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Action Bar -->
                            <div class="status-actions">
                                <div>
                                    <span class="text-muted fw-semibold">Payment: </span>
                                    <span class="badge border border-success text-success fs-6">${order.paymentMethod ? order.paymentMethod.toUpperCase() : 'CASH ON DELIVERY'}</span>
                                </div>
                                <div>
                                    ${nextActionHtml}
                                </div>
                            </div>
                        </div>
                    `;
                });

                document.getElementById('ordersContainer').innerHTML = html;

            } catch (err) {
                console.error('Fetch error:', err);
                document.getElementById('ordersContainer').innerHTML = `<div class="alert alert-danger shadow-lg p-4"><h3>Error Loading Orders</h3><p>${err.message}</p></div>`;
            }
        }

        document.addEventListener('DOMContentLoaded', fetchOrders);
    </script>
</body>

</html>
