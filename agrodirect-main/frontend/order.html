<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title data-i18n="myOrders">My Orders & Tracking - AgroDirect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #2e7d32;
            --secondary-color: #8bc34a;
            --light-green: #e8f5e9;
            --dark-green: #1b5e20;
            --text-color: #333;
            --bg-grad: linear-gradient(135deg, #f5f7fa 0%, #e8f5e9 100%);
        }

        body {
            font-family: 'Poppins', sans-serif;
            color: var(--text-color);
            background: var(--bg-grad);
            min-height: 100vh;
        }

        .custom-navbar {
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.08);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        /* Glassmorphism Order Card */
        .glass-order-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .glass-order-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(46, 125, 50, 0.15);
        }

        .order-header-badge {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
            box-shadow: 0 4px 10px rgba(46, 125, 50, 0.3);
        }

        .item-list {
            background: rgba(255,255,255,0.5);
            border-radius: 12px;
            padding: 15px;
            margin-top: 15px;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px dashed rgba(0,0,0,0.1);
        }
        .item-row:last-child {
            border-bottom: none;
        }

        .cancel-order-btn {
            border-radius: 999px;
            padding: 10px 18px;
            font-weight: 600;
        }

        .order-cancelled-note {
            background: #fff3f3;
            color: #b71c1c;
            border: 1px solid #ffcdd2;
            border-radius: 12px;
            padding: 12px 16px;
            margin-top: 16px;
            font-weight: 600;
        }

        .order-toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1080;
        }

        .order-toast {
            border: 0;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.14);
            border-radius: 16px;
            overflow: hidden;
        }

        /* Animated Tracking Timeline */
        .tracking-container {
            margin: 40px 0 20px 0;
        }

        .tracking-icon {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: white;
            border: 4px solid #e0e0e0;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #b0b0b0;
            font-size: 18px;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            z-index: 2;
        }

        .tracking-step.completed .tracking-icon {
            background: var(--primary-color);
            border-color: #fff;
            color: white;
            box-shadow: 0 0 0 4px rgba(46, 125, 50, 0.2);
            transform: scale(1.1);
        }

        .tracking-step.active .tracking-icon {
            background: var(--accent-color, #f9a825);
            border-color: #fff;
            color: white;
            box-shadow: 0 0 15px rgba(249, 168, 37, 0.6);
            animation: pulse-ring 2s infinite;
        }

        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(249, 168, 37, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(249, 168, 37, 0); }
            100% { box-shadow: 0 0 0 0 rgba(249, 168, 37, 0); }
        }

        .tracking-label {
            font-weight: 600;
            margin-top: 10px;
            color: #666;
            transition: color 0.3s;
        }

        .tracking-step.completed .tracking-label { color: var(--primary-color); }
        .tracking-step.active .tracking-label { color: var(--accent-color, #f9a825); }

        .progress-background {
            height: 6px;
            background: #e0e0e0;
            position: absolute;
            top: 20px;
            left: 10%;
            right: 10%;
            border-radius: 3px;
            z-index: 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--secondary-color), var(--primary-color));
            border-radius: 3px;
            transition: width 1s ease-in-out;
        }

        /* Footer */
        .organic-footer {
            background-color: #1e3c14;
            color: rgba(255, 255, 255, 0.8);
            padding: 70px 0 20px;
            margin-top: 60px;
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg custom-navbar">
        <div class="container">
            <a class="navbar-brand premium-logo-nav" href="/home page/home.html">
                <span class="icon-stack-sm me-2">
                    <i class="fas fa-circle icon-bg"></i>
                    <i class="fas fa-leaf icon-main"></i>
                </span>
                <span class="logo-text">AgroDirect</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/home page/home.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="shopnow.html">Shop Now</a></li>
                    <li class="nav-item"><a class="nav-link" href="cart.html">Cart <i class="fas fa-shopping-cart"></i></a></li>
                </ul>
                <div class="d-flex align-items-center ms-3">
                    <button class="btn btn-outline-success" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container py-5">
        <h2 class="fw-bold mb-4 text-success"><i class="fas fa-box-open me-2"></i> My Orders</h2>
        <div id="ordersContainer">
            <div class="text-center py-5">
                <div class="spinner-border text-success" role="status" style="width: 3rem; height: 3rem;"></div>
                <h5 class="mt-3 text-success">Fetching your orders...</h5>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="organic-footer text-center">
        <div class="container">
            <p>&copy; 2026 AgroDirect All rights Reserved</p>
        </div>
    </footer>

    <div class="order-toast-container" id="orderToastContainer"></div>

    <div class="modal fade" id="cancelOrderModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg rounded-4 overflow-hidden">
                <div class="modal-header bg-danger text-white border-0">
                    <h5 class="modal-title"><i class="fas fa-triangle-exclamation me-2"></i>Cancel Order</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <p class="mb-2 fw-semibold">Are you sure you want to cancel this order?</p>
                    <p class="text-muted mb-0">You can only cancel the order before it is shipped.</p>
                </div>
                <div class="modal-footer border-0 px-4 pb-4 pt-0">
                    <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Keep Order</button>
                    <button type="button" class="btn btn-danger rounded-pill px-4" id="confirmCancelBtn">
                        <i class="fas fa-times me-2"></i>Yes, Cancel
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="order.js?v=2"></script>
</body>
</html>
