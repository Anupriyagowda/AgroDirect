<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | AgroDirect</title>
    <!-- Google Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@400;500;600&display=swap">
    <!-- Ionicons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <!-- Main Styles -->
    <link rel="stylesheet" href="index.css">
    <style>
        .reset-container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body data-theme="light">
    <div class="container">
        <div class="form-box">
            <div class="logo">
                <h1 class="premium-logo">
                    <span class="icon-stack">
                        <i class="fas fa-circle icon-bg"></i>
                        <i class="fas fa-leaf icon-main"></i>
                    </span>
                    AgroDirect
                </h1>
                <p class="tagline" data-i18n="tagline">Direct fresh from the farm</p>
            </div>

            <div id="resetFormContent">
                <h2 data-i18n="resetPasswordTitle">Reset Password</h2>
                <p style="text-align: center; color: var(--text-muted); margin-bottom: 25px;" data-i18n="enterNewPassword">Enter your new password below.</p>
                
                <div id="resetError" class="invalid-feedback" style="display: none;"></div>
                <div id="resetSuccess" class="success-message" style="display: none;"></div>

                <form id="passwordResetForm">
                    <div class="input-group">
                        <div class="floating-input-field">
                            <input type="password" id="newPassword" placeholder=" " required minlength="6" autocomplete="new-password">
                            <label for="newPassword" data-i18n="password">New Password</label>
                            <i class="fas fa-lock input-icon"></i>
                            <span class="password-eye" onclick="togglePasswordVisibility('newPassword', this)">
                                <i class="fas fa-eye"></i>
                            </span>
                        </div>

                        <div class="floating-input-field">
                            <input type="password" id="confirmPassword" placeholder=" " required minlength="6" autocomplete="new-password">
                            <label for="confirmPassword" data-i18n="confirmPassword">Confirm Password</label>
                            <i class="fas fa-lock input-icon"></i>
                            <span class="password-eye" onclick="togglePasswordVisibility('confirmPassword', this)">
                                <i class="fas fa-eye"></i>
                            </span>
                        </div>
                    </div>

                    <div class="password-requirements" data-i18n="passwordReq">
                        <i class="fas fa-info-circle"></i>
                        Password must be at least 6 characters long and include numbers/symbols.
                    </div>

                    <button type="submit" class="btn-custom">
                         <i class="fas fa-key me-2"></i> <span data-i18n="updatePassword">Update Password</span>
                    </button>
                </form>

                <div class="form-footer">
                    <p><span data-i18n="rememberPassword">Remembered your password?</span> <a href="index.html" class="toggle-link" data-i18n="login">Login</a></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Theme Switcher -->
    <div class="theme-toggle" onclick="toggleTheme()" title="Toggle Theme">
        <i class="fas fa-moon" id="themeIcon"></i>
    </div>

    <script type="module" src="lang-core.js"></script>
    <script src="reset-password.js"></script>
    <script>
        // Simple password toggle
        function togglePasswordVisibility(id, iconSpan) {
            const input = document.getElementById(id);
            const icon = iconSpan.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        // Theme management
        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('themeIcon');
            if (body.getAttribute('data-theme') === 'light') {
                body.setAttribute('data-theme', 'dark');
                icon.className = 'fas fa-sun';
                localStorage.setItem('agroDirectTheme', 'dark');
            } else {
                body.setAttribute('data-theme', 'light');
                icon.className = 'fas fa-moon';
                localStorage.setItem('agroDirectTheme', 'light');
            }
        }

        // Load saved theme
        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('agroDirectTheme') || 'light';
            document.body.setAttribute('data-theme', savedTheme);
            const icon = document.getElementById('themeIcon');
            if (icon) icon.className = savedTheme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
        });
    </script>
</body>
</html>
