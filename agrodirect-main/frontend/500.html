<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Internal Server Error | AgroDirect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700&family=Inter:wght@400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --primary: #2E5A1C;
            --primary-light: #4CAF50;
            --bg-cream: #f8f9fa;
            --text-dark: #1A1A1A;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f8f9fa 0%, #e8f5e9 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dark);
        }

        .error-container {
            text-align: center;
            padding: 40px;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(46, 125, 50, 0.1);
        }

        .error-code {
            font-family: 'Outfit', sans-serif;
            font-size: 120px;
            font-weight: 700;
            background: linear-gradient(45deg, var(--primary), var(--primary-light));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            line-height: 1;
        }

        .error-title {
            font-family: 'Outfit', sans-serif;
            font-size: 28px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 20px;
        }

        .error-message {
            color: #666;
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        .icon-box {
            font-size: 60px;
            color: var(--primary-light);
            margin-bottom: 30px;
        }

        .btn-premium {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 12px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-premium:hover {
            background: var(--primary-light);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(46, 125, 50, 0.2);
        }

        .btn-outline-premium {
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 12px 30px;
            border-radius: 12px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-outline-premium:hover {
            background: var(--primary);
            color: white;
        }

        .footer-logo {
            margin-top: 50px;
            opacity: 0.6;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            color: var(--primary);
        }
    </style>
    <script src="theme-customizer.js" defer></script>
</head>

<body>
    <div class="error-container">
        <div class="icon-box">
            <i class="fas fa-seedling"></i>
        </div>
        <div class="error-code">500</div>
        <div class="error-title">Oops! Harvesting Error</div>
        <div class="error-message">
            Something went unexpectedly wrong in our farm servers. Don't worry, our farmers are already working on
            fixing the soil.
        </div>

        <div class="d-flex flex-column flex-sm-row justify-content-center gap-3">
            <a href="home page/home.html" class="btn-premium">
                <i class="fas fa-home"></i> Back to Home
            </a>
            <a href="contactus.html" class="btn-outline-premium">
                <i class="fas fa-envelope"></i> Contact Support
            </a>
        </div>

        <div class="footer-logo">
            <i class="fas fa-leaf me-1"></i> AgroDirect
        </div>
    </div>
</body>

</html>
